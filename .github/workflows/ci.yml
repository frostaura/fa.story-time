name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Restore frontend deps
        run: cd src/frontend && npm ci

      - name: Restore backend deps
        run: dotnet restore src/backend/StoryTime.slnx

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test
