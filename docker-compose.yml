services:
  api:
    build:
      context: .
      dockerfile: src/backend/StoryTime.Api/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      StoryTime__Generation__PersistSeriesStoryBible: ${STORYTIME_PERSIST_SERIES_STORY_BIBLE:-true}
      StoryTime__Generation__PersistContinuityFacts: ${STORYTIME_PERSIST_CONTINUITY_FACTS:-true}
      StoryTime__Generation__StoryBibleFilePath: ${STORYTIME_STORY_BIBLE_FILE_PATH:-data/story-bibles.json}
      StoryTime__Generation__PosterModelProvider__Endpoint: ${STORYTIME_POSTER_PROVIDER_ENDPOINT:-}
      StoryTime__Generation__NarrationProvider__Endpoint: ${STORYTIME_NARRATION_PROVIDER_ENDPOINT:-}
      StoryTime__Generation__AiOrchestration__Endpoint: ${STORYTIME_AI_PROVIDER_ENDPOINT:-}
      StoryTime__Checkout__Provider__Endpoint: ${STORYTIME_CHECKOUT_PROVIDER_ENDPOINT:-}
